# OpenClaw + Kanban — runs alongside darkreach coordinator on Hetzner.
#
# Deploy:
#   cd deploy && docker compose -f docker-compose.openclaw.yml up -d
#
# Prerequisites:
#   - Docker installed on coordinator
#   - .env.openclaw generated by scripts/decrypt-secrets.sh
#   - DNS: openclaw.darkreach.ai, kanban.darkreach.ai → coordinator IP
#   - Nginx rules added (see nginx-darkreach.conf)
#
# Ports (localhost only — Nginx handles TLS termination):
#   18789: OpenClaw web UI + WebSocket
#   18790: Kanban board (OCD)

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: darkreach-openclaw
    volumes:
      # Character definitions and persistent state
      - openclaw-data:/root/.openclaw
      # Workspace with custom skills
      - ./openclaw/characters:/root/.openclaw/characters:ro
      - ./openclaw/skills:/root/openclaw/workspace/skills:ro
    ports:
      - "127.0.0.1:18789:18789"
    env_file:
      - ../.env.openclaw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  openclaw-kanban:
    image: ghcr.io/keeeeeeeks/opencode-dashboard:latest
    container_name: darkreach-kanban
    ports:
      - "127.0.0.1:18790:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  openclaw-data:
