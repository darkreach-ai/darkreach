# Logrotate configuration for darkreach nginx logs.
# Install: sudo cp deploy/darkreach-logrotate.conf /etc/logrotate.d/darkreach

/var/log/nginx/darkreach_*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) || true
    endscript
}
