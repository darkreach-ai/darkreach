<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: subtle radial highlight for depth -->
    <radialGradient id="bg" cx="50%" cy="48%" r="65%">
      <stop offset="0%" stop-color="#0e0e14"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>

    <!-- Ambient indigo glow on the background -->
    <radialGradient id="ambient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo fill: dark indigo center, bright indigo edges -->
    <radialGradient id="logo-fill" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="35%" stop-color="#4338ca"/>
      <stop offset="70%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </radialGradient>

    <!-- Soft bloom filter for the glow layer -->
    <filter id="bloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>

    <!-- Tighter glow for logo edge luminance -->
    <filter id="edge-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Ambient glow behind logo area -->
  <circle cx="256" cy="256" r="210" fill="url(#ambient)"/>

